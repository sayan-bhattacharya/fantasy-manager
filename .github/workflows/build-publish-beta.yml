name: Docker Build/Publish Beta

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DOCKER_REGISTRY: docker.io
      # Prefer configuring `DOCKER_IMAGE` as a GitHub Actions Variable.
      # Falls back to `<DOCKER_USERNAME>/fantasy-manager`.
      DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || format('{0}/fantasy-manager', secrets.DOCKER_USERNAME) }}
      DOCKER_TARGET_PLATFORM: linux/arm64,linux/amd64

      # Stash secrets into env vars so `if:` can gate on `env.*`.
      # (GitHub Actions does not allow directly referencing `secrets.*` in `if:` expressions.)
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPP_NAME: ${{ secrets.AZURE_CONTAINERAPP_NAME }}
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare
        if: success()
        id: prepare
        run: |
          echo "docker_platform=${DOCKER_TARGET_PLATFORM}" >> $GITHUB_OUTPUT
          echo "docker_image=${DOCKER_REGISTRY}/${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Run Buildx (push image)
        if: success()
        run: |
          docker buildx build --platform ${{ steps.prepare.outputs.docker_platform }} --tag ${{ steps.prepare.outputs.docker_image }}:nightly --file ./Dockerfile --push .

      - name: Azure Login
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.AZURE_RESOURCE_GROUP != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure (Container App or Web App)
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.AZURE_RESOURCE_GROUP != '' }}
        uses: azure/CLI@v2
        env:
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPP_NAME: ${{ env.AZURE_CONTAINERAPP_NAME }}
          AZURE_WEBAPP_NAME: ${{ env.AZURE_WEBAPP_NAME }}
          IMAGE_TO_DEPLOY: ${{ steps.prepare.outputs.docker_image }}:nightly
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PAT }}
        with:
          inlineScript: |
            set -euo pipefail

            echo "Deploying image: ${IMAGE_TO_DEPLOY}"

            if [ -n "${AZURE_CONTAINERAPP_NAME:-}" ]; then
              az extension add --name containerapp --upgrade >/dev/null
              az containerapp update \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --name "${AZURE_CONTAINERAPP_NAME}" \
                --image "${IMAGE_TO_DEPLOY}"
              exit 0
            fi

            if [ -n "${AZURE_WEBAPP_NAME:-}" ]; then
              REGISTRY_URL="https://index.docker.io/v1/"
              if [ -n "${DOCKER_USERNAME:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
                az webapp config container set \
                  --resource-group "${AZURE_RESOURCE_GROUP}" \
                  --name "${AZURE_WEBAPP_NAME}" \
                  --docker-custom-image-name "${IMAGE_TO_DEPLOY}" \
                  --docker-registry-server-url "${REGISTRY_URL}" \
                  --docker-registry-server-user "${DOCKER_USERNAME}" \
                  --docker-registry-server-password "${DOCKER_PASSWORD}"
              else
                az webapp config container set \
                  --resource-group "${AZURE_RESOURCE_GROUP}" \
                  --name "${AZURE_WEBAPP_NAME}" \
                  --docker-custom-image-name "${IMAGE_TO_DEPLOY}" \
                  --docker-registry-server-url "${REGISTRY_URL}"
              fi
              az webapp restart --resource-group "${AZURE_RESOURCE_GROUP}" --name "${AZURE_WEBAPP_NAME}"
              exit 0
            fi

            echo "Azure deploy skipped: set AZURE_CONTAINERAPP_NAME or AZURE_WEBAPP_NAME as a GitHub Actions secret."
