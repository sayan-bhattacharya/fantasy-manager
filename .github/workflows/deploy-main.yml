name: CI / Deploy → Azure (main)

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SQLITE: test.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run pretty

      - name: Unit tests
        run: npm run test:cli

      - name: Lint
        run: npm run lint

      - name: Build (test)
        run: npm run build

      - name: DB types check
        run: npm run dbtypes:check

  # ── 2. Build & Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies (include dev for ts-node runtime)
        run: npm ci

      - name: Build production app
        env:
          NODE_ENV: production
          APP_ENV: production
          SQLITE: /tmp/build.db
          NEXTAUTH_URL: https://fantasy-manager-app.azurewebsites.net
          NEXTAUTH_SECRET: ci-build-placeholder
        run: npm run build

      - name: Remove build-only assets
        run: |
          rm -rf scripts/data scripts/data.ts 2>/dev/null || true
          rm -f /tmp/build.db 2>/dev/null || true

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "cypress/*" \
            -x "pages/*" \
            -x "components/*" \
            -x "styles/*" \
            -x "node_modules/.cache/*" \
            -x ".next/cache/*" \
            -x "*.db" -x "*.db-shm" -x "*.db-wal" \
            -x "deploy.zip" \
            -x "*.test.ts" -x "*.spec.ts"
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group rg-fantasy-manager \
            --name fantasy-manager-app \
            --src-path deploy.zip \
            --type zip \
            --timeout 600

      - name: Verify deployment
        run: |
          echo "Deployed commit ${{ github.sha }} to:"
          echo "https://fantasy-manager-app.azurewebsites.net"
