name: Docker Build/Publish Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      ACR_REGISTRY: acrfantasymanager.azurecr.io
      ACR_IMAGE: acrfantasymanager.azurecr.io/fantasy-manager
      DOCKER_TARGET_PLATFORM: linux/amd64

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name acrfantasymanager

      - name: Build and push to ACR
        run: |
          docker buildx build \
            --platform ${{ env.DOCKER_TARGET_PLATFORM }} \
            --tag ${{ env.ACR_IMAGE }}:latest \
            --tag ${{ env.ACR_IMAGE }}:${{ github.event.release.tag_name }} \
            --file ./Dockerfile \
            --push .

      - name: Deploy to Azure Web App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail
            az webapp config container set \
              --resource-group rg-fantasy-manager \
              --name fantasy-manager-app \
              --docker-custom-image-name ${{ env.ACR_IMAGE }}:latest
            az webapp restart \
              --resource-group rg-fantasy-manager \
              --name fantasy-manager-app
            echo "Deployed ${{ env.ACR_IMAGE }}:${{ github.event.release.tag_name }} to fantasy-manager-app"
